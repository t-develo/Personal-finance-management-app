name: CI/CD Pipeline

# -----------------------------------------------------------------------
# Trigger strategy (avoids duplicate runs on PR branches):
#   - push to main      → build + test + deploy
#   - pull_request      → build + test only (no deploy)
#   - workflow_dispatch → manual run (build + test, deploy if on main)
# -----------------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs for the same ref to save CI minutes.
# On main we let runs complete so a queued deploy is never skipped.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal default permissions; individual jobs add only what they need.
permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Build & Test – Frontend (React / Vite + Vitest)
  # -----------------------------------------------------------------------
  build-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

      - name: Build
        run: npm run build

      # Upload the production build so the deploy job can reuse it
      # without rebuilding from scratch.
      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # -----------------------------------------------------------------------
  # Job 2: Test – API (Azure Functions / Jest)
  # -----------------------------------------------------------------------
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

  # -----------------------------------------------------------------------
  # Job 3: Deploy – runs ONLY on push to main, after CI jobs pass
  # -----------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: [build-test-frontend, test-api]
    # Guard: deploy only on direct push to main (not on PRs or other branches).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      # Required by the Azure Static Web Apps action to post PR comments.
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download frontend build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend/dist"
          api_location: "api"
          output_location: ""
          # The frontend is already built; skip the Oryx build step.
          skip_app_build: true
